services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - search.max_buckets=200000
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - 'TIMEPICKER_TIME_DEFAULTS={"from":"now-1h","to":"now"}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana-setup:
    image: node:22-alpine
    volumes:
      - ./scripts/kibana-setup.mjs:/setup/kibana-setup.mjs:ro
    command: ["node", "/setup/kibana-setup.mjs"]
    environment:
      KIBANA_URL: http://kibana:5601
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: telemetry
      ANOMALY_SPACECRAFT_ID: DEMO-SAT-042
      NUM_SPACECRAFT: 200
      ML_JOB_ID: telemetry-population
      ML_ANOMALY_MAX_ATTEMPTS: "24"
    depends_on:
      kibana:
        condition: service_healthy
      simulator:
        condition: service_started
      ml-setup:
        condition: service_completed_successfully

  telemetry-server:
    build: .
    ports:
      - "3000:3000"
      - "9000:9000"
    environment:
      HTTP_PORT: 3000
      TCP_PORT: 9000
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: telemetry
      ML_JOB_ID: telemetry-population
    depends_on:
      elasticsearch:
        condition: service_healthy

  simulator:
    build: .
    command: ["node", "dist/scripts/simulator.js"]
    environment:
      TCP_HOST: telemetry-server
      TCP_PORT: 9000
      NUM_SPACECRAFT: 200
      ANOMALY_SPACECRAFT_ID: DEMO-SAT-042
      PROP_ANOMALY_SPACECRAFT_ID: DEMO-SAT-087
      INTERVAL_MS: 1000
    depends_on:
      - telemetry-server

  ml-setup:
    image: curlimages/curl:8.12.1
    volumes:
      - ./scripts/ml-setup.sh:/setup/ml-setup.sh:ro
    entrypoint: ["/bin/sh", "/setup/ml-setup.sh"]
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: telemetry
      ML_JOB_ID: telemetry-population
      ML_MIN_DOCS: 5000
    depends_on:
      elasticsearch:
        condition: service_healthy
      simulator:
        condition: service_started

volumes:
  es-data:
